name: Docker — publish trader image

# Only fires on release events; pull-requests and master pushes do NOT trigger
# a publish. This keeps the workflow dormant until an operator cuts a release
# (gh release create vX.Y.Z). Bump the image tag in
# agentic-hosting/config/templates.json after a release lands so spawned
# tenants pick up the new image.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trader-service
        uses: actions/checkout@v4
        with:
          path: trader-service

      - name: Clone sphere-sdk sibling
        env:
          SPHERE_SDK_SHA: 44b4705352c1582575eeeafbc46dddc8d95e8995
        run: |
          git clone https://github.com/unicity-sphere/sphere-sdk.git sphere-sdk
          git -C sphere-sdk checkout --detach "$SPHERE_SDK_SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          # Build context is the parent directory containing both trader-service
          # and sphere-sdk siblings (the Dockerfile copies from both).
          context: .
          file: ./trader-service/Dockerfile
          push: true
          # GHCR namespace MUST match the repo owner — GITHUB_TOKEN scopes
          # are tied to the repo. Currently vrogojin/; switch to
          # unicitynetwork/ once the repo migrates to the org and a PAT or
          # GitHub App is configured for cross-org pushes.
          tags: |
            ghcr.io/vrogojin/agentic-hosting/trader:${{ github.event.release.tag_name }}
            ghcr.io/vrogojin/agentic-hosting/trader:latest
